<form class="app-shadow bg-panel p-5 sm:p-6" [formGroup]="form" (ngSubmit)="submit()">
  <div class="mb-5 flex items-start justify-between gap-4">
    <div>
      <h2 class="text-xl font-black text-ink">{{ habit ? 'Editar habito' : 'Novo habito' }}</h2>
      <p class="mt-1 text-sm text-muted-ink">Defina uma rotina simples e mensuravel.</p>
    </div>

    <button
      type="button"
      (click)="cancelForm.emit()"
      class="flex h-9 w-9 items-center justify-center rounded border border-line text-muted-ink transition hover:bg-panel-soft"
      title="Fechar formulario"
    >
      <lucide-icon [img]="icons.x" size="17"></lucide-icon>
    </button>
  </div>

  <div class="grid gap-4">
    <label class="block">
      <span class="mb-1.5 block text-xs font-bold uppercase text-muted-ink">Titulo</span>
      <input
        formControlName="title"
        class="h-12 w-full rounded border border-line px-4 text-sm text-ink outline-none transition focus:border-brand-blue focus:ring-2 focus:ring-brand-blue/15"
        placeholder="Workout"
      />
      @if (isInvalid('title')) {
        <span class="mt-1 block text-xs text-red-600">Informe pelo menos 3 caracteres.</span>
      }
    </label>

    <label class="block">
      <span class="mb-1.5 block text-xs font-bold uppercase text-muted-ink">Descricao</span>
      <textarea
        formControlName="description"
        class="min-h-24 w-full rounded border border-line px-4 py-3 text-sm text-ink outline-none transition focus:border-brand-blue focus:ring-2 focus:ring-brand-blue/15"
        placeholder="Go to gym"
      ></textarea>
      @if (isInvalid('description')) {
        <span class="mt-1 block text-xs text-red-600">Use no maximo 240 caracteres.</span>
      }
    </label>

    <label class="block">
      <span class="mb-1.5 block text-xs font-bold uppercase text-muted-ink">Frequência</span>
      <select
        formControlName="frequency"
        class="h-12 w-full rounded border border-line px-4 text-sm text-ink outline-none transition focus:border-brand-blue focus:ring-2 focus:ring-brand-blue/15"
      >
        @for (option of frequencyOptions; track option.value) {
          <option [value]="option.value">{{ option.label }}</option>
        }
      </select>
      @if (isInvalid('frequency')) {
        <span class="mt-1 block text-xs text-red-600">Escolha uma frequência válida.</span>
      }
    </label>
  </div>

  <div class="mt-6 flex flex-col gap-3 sm:flex-row">
    <button
      type="submit"
      [disabled]="submitting"
      class="flex h-11 flex-1 items-center justify-center gap-2 rounded bg-brand-blue text-sm font-bold text-white transition hover:bg-brand-blue-dark disabled:pointer-events-none disabled:opacity-60"
    >
      <lucide-icon [img]="icons.save" size="17"></lucide-icon>
      <span>{{ submitting ? 'Salvando...' : 'Save' }}</span>
    </button>

    <button
      type="button"
      (click)="cancelForm.emit()"
      class="h-11 flex-1 rounded border border-brand-blue/45 text-sm font-bold text-ink transition hover:bg-brand-blue-soft"
    >
      Cancel
    </button>
  </div>
</form>
