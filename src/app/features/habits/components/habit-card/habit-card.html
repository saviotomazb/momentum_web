<article
  class="group flex h-full flex-col justify-between border border-line bg-white p-5 shadow-sm transition duration-200 hover:-translate-y-0.5 hover:shadow-[0_14px_28px_rgba(35,63,102,0.14)]"
>
  <div>
    <div class="flex items-start justify-between gap-4">
      <div>
        <h3 class="text-lg font-black text-ink">{{ habit.title }}</h3>
        @if (habit.description) {
          <p class="mt-1 text-sm leading-6 text-muted-ink">{{ habit.description }}</p>
        }
      </div>

      <span
        class="flex h-9 w-9 shrink-0 items-center justify-center rounded border"
        [class]="
          habit.completedToday
            ? 'border-success bg-success text-white'
            : 'border-line bg-panel-soft text-muted-ink'
        "
      >
        <lucide-icon [img]="icons.check" size="18"></lucide-icon>
      </span>
    </div>

    <div class="mt-5 grid grid-cols-2 gap-3">
      <div class="border border-line bg-panel-soft px-3 py-2">
        <div class="flex items-center gap-2 text-sm font-bold text-ink">
          <lucide-icon [img]="icons.flame" size="16" class="text-[#f25f4c]"></lucide-icon>
          <span>{{ habit.currentStreak }} dias</span>
        </div>
        <p class="mt-1 text-xs text-muted-ink">Streak atual</p>
      </div>

      <div class="border border-line bg-panel-soft px-3 py-2">
        <p class="text-sm font-bold text-ink">{{ habit.totalCompletions }}</p>
        <p class="mt-1 text-xs text-muted-ink">Conclusoes</p>
      </div>
    </div>

    <div class="mt-4 flex items-center justify-between text-sm">
      <span class="font-medium text-muted-ink">Frequência</span>
      <strong class="text-ink">{{ getFrequencyLabel(habit.frequency) }}</strong>
    </div>

    <div
      class="mt-3 border px-3 py-2 text-sm font-bold"
      [class]="
        habit.completedToday
          ? 'border-success/30 bg-green-50 text-success'
          : 'border-line bg-panel-soft text-muted-ink'
      "
    >
      {{ habit.completedToday ? 'Concluido hoje' : 'Pendente hoje' }}
    </div>
  </div>

  <div class="mt-5 grid grid-cols-[1fr_auto_auto] gap-2">
    <button
      type="button"
      (click)="completeHabit.emit(habit)"
      [disabled]="habit.completedToday || completing"
      class="flex h-10 items-center justify-center gap-2 rounded bg-success px-4 text-sm font-bold text-white transition hover:brightness-95 disabled:pointer-events-none disabled:bg-[#91bea8]"
    >
      @if (completing) {
        <lucide-icon [img]="icons.loader" size="16" class="animate-spin"></lucide-icon>
      } @else {
        <lucide-icon [img]="icons.check" size="16"></lucide-icon>
      }
      <span>{{ habit.completedToday ? 'Done' : 'Complete' }}</span>
    </button>

    <button
      type="button"
      (click)="editHabit.emit(habit)"
      class="flex h-10 w-10 items-center justify-center rounded border border-line text-brand-blue transition hover:bg-brand-blue-soft"
      title="Editar"
    >
      <lucide-icon [img]="icons.pencil" size="17"></lucide-icon>
    </button>

    <button
      type="button"
      (click)="deleteHabit.emit(habit)"
      class="flex h-10 w-10 items-center justify-center rounded border border-red-200 text-red-600 transition hover:bg-red-50"
      title="Excluir"
    >
      <lucide-icon [img]="icons.trash" size="17"></lucide-icon>
    </button>
  </div>
</article>
