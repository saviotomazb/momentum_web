<div
  class="pointer-events-none fixed right-4 top-20 z-50 flex w-[calc(100vw-2rem)] max-w-sm flex-col gap-3"
>
  @for (toast of toastService.toasts(); track toast.id) {
    <div
      class="animate-toast-in pointer-events-auto flex items-start gap-3 border px-4 py-3 shadow-[0_16px_36px_rgba(35,63,102,0.18)]"
      [class]="classesFor(toast.type)"
    >
      <lucide-icon [img]="iconFor(toast.type)" size="18" class="mt-0.5 shrink-0"></lucide-icon>
      <p class="flex-1 text-sm font-bold leading-5">{{ toast.message }}</p>
      <button
        type="button"
        class="flex h-6 w-6 shrink-0 items-center justify-center rounded text-current opacity-70 transition hover:bg-white/60 hover:opacity-100"
        (click)="toastService.dismiss(toast.id)"
        title="Fechar"
      >
        <lucide-icon [img]="icons.close" size="14"></lucide-icon>
      </button>
    </div>
  }
</div>
