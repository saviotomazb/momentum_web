<header class="flex h-16 w-full items-center justify-between bg-brand-blue px-5 text-white shadow-[0_3px_12px_rgba(35,63,102,0.18)] sm:px-7">
  <div class="flex items-center gap-2">
    <span class="text-xl font-black tracking-normal">
      Momentum
    </span>
  </div>

  <div class="flex items-center gap-3">
    @if (authService.currentUser(); as user) {
      <div class="hidden flex-col text-right sm:flex">
        <span class="text-xs text-blue-100">Logado como</span>
        <span class="text-sm font-medium text-white">{{ user.email }}</span>
      </div>
    }

    <button 
      (click)="logout()" 
      class="group flex h-9 w-9 items-center justify-center rounded border border-white/25 bg-brand-blue-dark/40 text-white transition-colors hover:bg-white/10"
      title="Sair">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="transition-transform group-hover:translate-x-0.5">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
        <polyline points="16 17 21 12 16 7"></polyline>
        <line x1="21" y1="12" x2="9" y2="12"></line>
      </svg>
    </button>
  </div>
</header>
